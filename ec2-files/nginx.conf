# =============================================================================
# Nginx Main Configuration — GutBot Production
# =============================================================================
# Install:  sudo cp nginx.conf /etc/nginx/nginx.conf
#           sudo nginx -t && sudo systemctl reload nginx
#
# This replaces Ubuntu's default /etc/nginx/nginx.conf entirely.
# Resource-safe settings: designed to handle high concurrency while
# leaving CPU and RAM headroom for sshd and system processes.
# =============================================================================

user www-data;

# ── Worker processes ──────────────────────────────────────────────────────────
# Do NOT use "auto" on small instances — it sets one worker per CPU core
# and can starve SSH under load.
#
#   t3.medium  (2 vCPU): worker_processes 1;
#   t3.large   (2 vCPU): worker_processes 1;
#   t3.xlarge  (4 vCPU): worker_processes 2;
#
# Each Nginx worker is event-driven and handles thousands of connections,
# so 1 worker is plenty for this workload.
worker_processes 1;

# Max open file descriptors per worker.
# 1024 is the typical OS default. Keep it here — do not raise to 65535
# as that can exhaust file descriptors system-wide and block SSH.
worker_rlimit_nofile 1024;

error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

events {
    # Max simultaneous connections this worker will handle.
    # 512 is safe for t3.medium/large. Nginx queues the rest.
    # For t3.xlarge with worker_processes 2, total = 2 × 512 = 1024.
    worker_connections 512;

    # Accept one connection at a time (safer under load;
    # prevents a burst from saturating the backend immediately)
    multi_accept off;

    # Linux best-practice event model
    use epoll;
}

http {
    # ── MIME ─────────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;   # Zero-copy file serving for static assets
    tcp_nopush         on;   # Send headers + start of body in one packet
    tcp_nodelay        on;   # Disable Nagle for API responses
    server_tokens      off;  # Do not expose Nginx version in responses

    # Keep connections alive for 30s of idle time.
    # Too high = connections pile up and exhaust worker_connections.
    # Too low = more TCP handshake overhead.
    keepalive_timeout  30;
    keepalive_requests 100;

    types_hash_max_size 2048;

    # ── Client limits ─────────────────────────────────────────────────────────
    # PDF uploads are max 50 MB in Flask; add a margin here.
    client_max_body_size     55M;

    # Drop slow clients that never finish sending their request body
    client_body_timeout      30s;
    client_header_timeout    10s;

    # Drop connections where we stall trying to send a response
    send_timeout             60s;

    # Protect against oversized headers (common in some attack vectors)
    large_client_header_buffers 4 8k;

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Compress API JSON responses and static assets to reduce bandwidth.
    # Level 4 = good compression with low CPU cost (1=fastest, 9=best compression).
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;   # Don't bother compressing tiny responses
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Shared memory zones (10m = stores ~160,000 IP addresses).
    # Limits are per IP address so one heavy user cannot block others.

    # API zone: 10 requests/second per IP
    # A normal user chatting fast sends ~1 req/sec; 10/s allows normal bursts.
    limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=10r/s;

    # Upload zone: stricter — 2 uploads/second per IP is already generous
    limit_req_zone  $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # Max simultaneous connections per IP (all endpoints combined)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # When a rate limit is hit, return 429 (not default 503)
    limit_req_status  429;
    limit_conn_status 429;

    # ── Proxy defaults (inherited by all proxy_pass locations) ────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection "";  # Enable keepalive to Gunicorn
    proxy_connect_timeout   10s;
    proxy_read_timeout      120s;  # Must be >= Gunicorn timeout (120s in gunicorn.conf.py)
    proxy_send_timeout      30s;

    # Disable buffering for streaming responses and large uploads
    proxy_buffering         off;
    proxy_request_buffering off;

    # ── Site configs ──────────────────────────────────────────────────────────
    include /etc/nginx/sites-enabled/*;
}
